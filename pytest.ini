[pytest]
# Pytest configuration for patent ingestion system

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 6.0

# Command line options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Strict config (fail on unknown config options)
    --strict-config
    # Coverage reporting (if pytest-cov is installed)
    --cov=doc_extractor
    --cov-report=html
    --cov-report=term-missing
    # Fail on warnings (comment out during development)
    # -W error

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for complete workflows
    slow: Tests that take significant time to run
    requires_pdf: Tests that require PDF fixture files
    regression: Regression tests for previously fixed bugs

# Test output options
console_output_style = progress
log_cli = false
log_cli_level = INFO

# Coverage options
[coverage:run]
source = src/doc_extractor
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
# Fail if coverage is below this percentage
fail_under = 60
precision = 2
show_missing = true
skip_covered = false

exclude_lines =
    # Standard pragma
    pragma: no cover
    # Don't complain about missing debug code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    # Don't complain about abstract methods
    @abstractmethod
